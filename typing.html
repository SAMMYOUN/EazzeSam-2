<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-Modern Type Test</title>
    <!-- Tailwind CSS for sleek, modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom cursor and character styling for that premium feel */
        .word { margin-right: 12px; display: inline-block; }
        .char { position: relative; color: #64748b; transition: color 0.1s ease; }
        .char.correct { color: #f8fafc; }
        .char.incorrect { color: #ef4444; border-bottom: 2px solid #ef4444; }
        
        .char.current::before {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 2px;
            height: 120%;
            background-color: #e2e8f0;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-center items-center font-sans selection:bg-slate-700">

    <div class="w-full max-w-3xl px-6">
        <!-- Live Stats Panel -->
        <div class="flex gap-12 mb-8 text-sm uppercase tracking-widest text-slate-400 font-semibold">
            <div>wpm: <span id="wpm" class="text-emerald-400 text-2xl font-bold block normal-case">0</span></div>
            <div>accuracy: <span id="accuracy" class="text-emerald-400 text-2xl font-bold block normal-case">100%</span></div>
            <div>time: <span id="timer" class="text-slate-200 text-2xl font-bold block normal-case">0s</span></div>
        </div>

        <!-- Word Display Container -->
        <div id="words-container" class="text-2xl md:text-3xl leading-relaxed text-left select-none outline-none cursor-text bg-slate-800/40 p-8 rounded-2xl border border-slate-800 backdrop-blur-sm shadow-xl min-h-[150px]" tabindex="0">
            <!-- Words will be injected here via JS -->
        </div>

        <!-- Hidden input to capture mobile/desktop typing seamlessly -->
        <input type="text" id="hidden-input" class="absolute opacity-0 pointer-events-none" autocomplete="off" autofocus>

        <!-- Controls -->
        <div class="mt-8 flex items-center justify-between">
            <p class="text-xs text-slate-500">Click the box and start typing. Press <kbd class="bg-slate-800 px-2 py-1 rounded text-slate-400">Esc</kbd> or click restart to reset.</p>
            <button id="restart-btn" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-slate-600 px-5 py-2 rounded-xl text-sm font-medium transition-all duration-200 flex items-center gap-2">
                Restart
            </button>
        </div>
    </div>

    <script>
        const quotes = [
            "the quick brown fox jumps over the lazy dog",
            "success is not final failure is not fatal it is the courage to continue that counts",
            "simplicity is the ultimate sophistication of modern design and functional code",
            "javascript rules the web while cascading style sheets make it look beautiful",
            "focus on the journey not the destination joy is found in the doing"
        ];

        const container = document.getElementById('words-container');
        const hiddenInput = document.getElementById('hidden-input');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');
        const timerDisplay = document.getElementById('timer');
        const restartBtn = document.getElementById('restart-btn');

        let words = [];
        let totalTyped = 0;
        let correctTyped = 0;
        let startTime = null;
        let timerInterval = null;
        let isPlaying = false;

        function initGame() {
            clearInterval(timerInterval);
            container.innerHTML = '';
            hiddenInput.value = '';
            wpmDisplay.textContent = '0';
            accuracyDisplay.textContent = '100%';
            timerDisplay.textContent = '0s';
            startTime = null;
            isPlaying = false;
            totalTyped = 0;
            correctTyped = 0;

            // Pick a random quote and split into words/chars
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            words = randomQuote.split(' ');

            words.forEach((wordStr, wIdx) => {
                const wordSpan = document.createElement('span');
                wordSpan.className = 'word';
                
                wordStr.split('').forEach((charStr) => {
                    const charSpan = document.createElement('span');
                    charSpan.className = 'char';
                    charSpan.textContent = charStr;
                    wordSpan.appendChild(charSpan);
                });

                // Add space character span unless it's the last word
                if (wIdx < words.length - 1) {
                    const spaceSpan = document.createElement('span');
                    spaceSpan.className = 'char';
                    spaceSpan.innerHTML = '&nbsp;';
                    wordSpan.appendChild(spaceSpan);
                }
                
                container.appendChild(wordSpan);
            });

            // Set the very first character as current
            container.querySelectorAll('.char')[0].classList.add('current');
        }

        function handleTyping(e) {
            const chars = container.querySelectorAll('.char');
            const typedText = hiddenInput.value;
            
            if (!isPlaying && typedText.length > 0) {
                isPlaying = true;
                startTime = Date.now();
                timerInterval = setInterval(updateStats, 100);
            }

            totalTyped = typedText.length;
            correctTyped = 0;

            chars.forEach((charSpan, index) => {
                charSpan.classList.remove('current', 'correct', 'incorrect');
                
                if (index < typedText.length) {
                    // Normalize &nbsp; for space comparison
                    const expected = charSpan.innerHTML === '&nbsp;' ? ' ' : charSpan.textContent;
                    const actual = typedText[index];
                    
                    if (actual === expected) {
                        charSpan.classList.add('correct');
                        correctTyped++;
                    } else {
                        charSpan.classList.add('incorrect');
                    }
                }

                if (index === typedText.length) {
                    charSpan.classList.add('current');
                }
            });

            updateStats();

            // End game if the user has typed everything
            if (typedText.length >= chars.length) {
                clearInterval(timerInterval);
                isPlaying = false;
            }
        }

        function updateStats() {
            if (!startTime) return;
            const timeElapsed = (Date.now() - startTime) / 1000; // in seconds
            timerDisplay.textContent = `${Math.floor(timeElapsed)}s`;

            // Accuracy calculation
            if (totalTyped > 0) {
                const acc = Math.round((correctTyped / totalTyped) * 100);
                accuracyDisplay.textContent = `${acc}%`;
            }

            // WPM calculation: (Standard word length is 5 characters)
            if (timeElapsed > 0.5) {
                const wpm = Math.round((correctTyped / 5) / (timeElapsed / 60));
                wpmDisplay.textContent = wpm;
            }
        }

        // Event Listeners
        container.addEventListener('click', () => hiddenInput.focus());
        hiddenInput.addEventListener('input', handleTyping);
        restartBtn.addEventListener('click', initGame);
        
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') initGame();
            // Refocus hidden input if user just starts typing
            if (document.activeElement !== hiddenInput && e.key.length === 1) {
                hiddenInput.focus();
            }
        });

        // Start on load
        initGame();
        hiddenInput.focus();
    </script>
</body>
</html>
